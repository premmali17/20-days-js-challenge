<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <div class="balance-box">
        <h3>Total Balance</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <form id="expenseForm">

        <input
            type="text"
            id="title"
            placeholder="Expense Title"
            required
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount"
            required
        >

        <button type="submit">
            Add Expense
        </button>

    </form>

    <div id="expenseList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
